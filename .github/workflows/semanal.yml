name: Agente Avicola Semanal

on:
  schedule:
    - cron: '0 13 * * 1'
  workflow_dispatch:

jobs:
  ejecutar-agente:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install anthropic requests pandas
      - name: Ejecutar agente
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python agente_avicola.py
      - uses: actions/upload-artifact@v4
        with:
          name: reporte-${{ github.run_number }}
          path: reportes/
          retention-days: 30
