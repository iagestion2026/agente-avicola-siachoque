name: Agente Avicola Semanal

on:
  schedule:
    - cron: '0 13 * * 1'
  workflow_dispatch:

jobs:
  ejecutar-agente:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar librerias
        run: pip install anthropic requests pandas

      - name: Ejecutar agente avicola
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python agente_avicola.py

      - name: Enviar reporte y Excels por correo
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
        run: |
          python - <<'EOF'
          import smtplib, os, glob
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText
          from email.mime.base import MIMEBase
          from email import encoders
          from datetime import date

          usuario = os.environ['GMAIL_USER']
          clave   = os.environ['GMAIL_PASSWORD'].replace(' ', '')
          fecha   = date.today().isoformat()

          # Leer reporte TXT como cuerpo del correo
          reportes_txt = glob.glob('reportes/reporte_*.txt')
          cuerpo = f"Reporte Avicola Siachoque - {fecha}\n\nVer archivos adjuntos Excel."
          if reportes_txt:
              with open(reportes_txt[0], 'r', encoding='utf-8') as f:
                  cuerpo = f.read()

          # Crear mensaje
          msg = MIMEMultipart()
          msg['From']    = usuario
          msg['To']      = usuario
          msg['Subject'] = f'Reporte Avicola Siachoque - {fecha}'
          msg.attach(MIMEText(cuerpo, 'plain', 'utf-8'))

          # Adjuntar TODOS los CSV de la carpeta reportes
          archivos_csv = glob.glob('reportes/*.csv')
          archivos_json = glob.glob('reportes/*.json')
          archivos_adjuntar = archivos_csv + archivos_json

          print(f"Archivos a adjuntar: {len(archivos_adjuntar)}")
          for archivo in archivos_adjuntar:
              nombre = os.path.basename(archivo)
              print(f"  Adjuntando: {nombre}")
              try:
                  with open(archivo, 'rb') as f:
                      contenido = f.read()
                  part = MIMEBase('application', 'octet-stream')
                  part.set_payload(contenido)
                  encoders.encode_base64(part)
                  part.add_header(
                      'Content-Disposition',
                      f'attachment; filename="{nombre}"'
                  )
                  msg.attach(part)
              except Exception as e:
                  print(f"  Error adjuntando {nombre}: {e}")

          # Enviar
          try:
              server = smtplib.SMTP_SSL('smtp.gmail.com', 465)
              server.login(usuario, clave)
              server.sendmail(usuario, usuario, msg.as_string())
              server.close()
              print(f'Correo enviado a {usuario} con {len(archivos_adjuntar)} archivos adjuntos')
          except Exception as e:
              print(f'Error enviando correo: {e}')
              raise
          EOF

      - name: Guardar reportes en GitHub (descargables 30 dias)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reporte-${{ github.run_number }}-${{ github.run_attempt }}
          path: reportes/
          retention-days: 30
