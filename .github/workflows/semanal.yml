name: Agente Avicola Semanal

on:
  schedule:
    - cron: '0 13 * * 1'
  workflow_dispatch:

jobs:
  ejecutar-agente:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar librerias
        run: pip install anthropic requests pandas

      - name: Ejecutar agente avicola
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python agente_avicola.py

      - name: Publicar en Gist y enviar correo
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python enviar_correo.py

      - name: Guardar artefactos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reporte-${{ github.run_number }}
          path: reportes/
          retention-days: 30
