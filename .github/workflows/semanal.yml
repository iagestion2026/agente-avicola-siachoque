name: Agente Avicola Semanal

on:
  schedule:
    - cron: '0 13 * * 1'
  workflow_dispatch:

jobs:
  ejecutar-agente:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar librerias
        run: pip install anthropic requests pandas

      - name: Ejecutar agente avicola
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python agente_avicola.py

      - name: Buscar Fundacion Dando Pasos en web y generar CSV
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python - <<'PYEOF'
          import requests, csv, os, json
          from datetime import date
          from pathlib import Path

          API_KEY = os.environ.get("ANTHROPIC_API_KEY","")
          Path("reportes").mkdir(exist_ok=True)
          fecha = date.today().isoformat()
          NIT = "900514813"

          # Buscar en web con Claude
          print("Buscando Fundacion Dando Pasos de Vida en web...")
          try:
              r = requests.post(
                  "https://api.anthropic.com/v1/messages",
                  headers={"Content-Type":"application/json",
                           "x-api-key": API_KEY,
                           "anthropic-version":"2023-06-01"},
                  json={
                      "model": "claude-sonnet-4-20250514",
                      "max_tokens": 2000,
                      "tools": [{"type":"web_search_20250305","name":"web_search"}],
                      "messages": [{"role":"user","content": f"""
Busca informacion sobre la Fundacion Dando Pasos de Vida, NIT {NIT}, Colombia.

1. Busca en community.secop.gov.co todos los contratos donde aparezca como proveedor
   con NIT {NIT} o nombre "Dando Pasos de Vida"

2. Busca en datos.gov.co contratos con ese NIT

3. Busca en Google: "Dando Pasos de Vida" Boyaca contratos ICBF PAE municipios

Para cada contrato encontrado reporta:
- Municipio
- Entidad contratante  
- Objeto del contrato (que programa: PAE, FAMI, ICBF, etc.)
- Valor del contrato
- Fecha

Tambien reporta:
- En cuantos municipios de Boyaca opera
- Que tipo de programas maneja (PAE, FAMI, hogares comunitarios, etc.)
- Si hay contratos vigentes en 2025 o 2026

Formato: lista clara y detallada.
"""}]
                  },
                  timeout=90
              )
              r.raise_for_status()
              data = r.json()
              texto = " ".join(b["text"] for b in data.get("content",[])
                               if b.get("type")=="text")
          except Exception as e:
              texto = f"Error buscando: {e}"

          print("Resultado busqueda web:")
          print(texto[:1000])

          # Guardar resultado en TXT
          with open(f"reportes/dando_pasos_investigacion_{fecha}.txt","w",
                    encoding="utf-8") as f:
              f.write(f"INVESTIGACION: FUNDACION DANDO PASOS DE VIDA\n")
              f.write(f"NIT: {NIT}\n")
              f.write(f"Fecha: {fecha}\n")
              f.write("="*50 + "\n\n")
              f.write(texto)

          # Verificar si el CSV de Dando Pasos tiene datos
          csv_dando = f"reportes/6_DANDO_PASOS_{fecha}.csv"
          try:
              with open(csv_dando, "r", encoding="utf-8-sig") as f:
                  lineas = f.readlines()
              n_filas = len(lineas) - 1  # restar encabezado
              print(f"CSV Dando Pasos: {n_filas} contratos encontrados en SECOP")
          except:
              n_filas = 0
              print("CSV Dando Pasos no encontrado")

          # Si no hay datos en SECOP, crear CSV con la info de la web
          if n_filas == 0:
              print("Creando CSV con datos de busqueda web...")
              campos = ["fuente","municipio","entidad","objeto","categoria",
                        "proveedor","nit_prov","valor","fecha","notas"]
              with open(csv_dando, "w", newline="", encoding="utf-8-sig") as f:
                  w = csv.DictWriter(f, fieldnames=campos)
                  w.writeheader()
                  w.writerow({
                      "fuente": "Busqueda Web Claude",
                      "municipio": "Ver investigacion adjunta",
                      "entidad": "Ver archivo dando_pasos_investigacion.txt",
                      "objeto": "Fundacion Dando Pasos de Vida",
                      "categoria": "Ver investigacion",
                      "proveedor": "FUNDACION DANDO PASOS DE VIDA",
                      "nit_prov": NIT,
                      "valor": "Ver investigacion",
                      "fecha": fecha,
                      "notas": texto[:500]
                  })
              print(f"CSV creado con informacion de busqueda web")

          PYEOF

      - name: Enviar reporte y todos los Excel por correo
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
        run: |
          python - <<'PYEOF'
          import smtplib, os, glob
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText
          from email.mime.base import MIMEBase
          from email import encoders
          from datetime import date

          usuario = os.environ['GMAIL_USER']
          clave   = os.environ['GMAIL_PASSWORD'].replace(' ','')
          fecha   = date.today().isoformat()

          # Cuerpo del correo — reporte TXT
          cuerpo = f"Reporte Avicola Siachoque - {fecha}\n\nVer archivos adjuntos."
          txt_files = glob.glob('reportes/reporte_*.txt')
          if txt_files:
              with open(txt_files[0],'r',encoding='utf-8') as f:
                  cuerpo = f.read()

          msg = MIMEMultipart()
          msg['From']    = usuario
          msg['To']      = usuario
          msg['Subject'] = f'Reporte Avicola Siachoque - {fecha}'
          msg.attach(MIMEText(cuerpo,'plain','utf-8'))

          # Adjuntar TODOS los archivos de reportes
          adjuntos = (
              sorted(glob.glob('reportes/*.csv')) +
              sorted(glob.glob('reportes/*.json')) +
              sorted(glob.glob('reportes/dando_pasos_*.txt'))
          )

          print(f"Adjuntando {len(adjuntos)} archivos...")
          for archivo in adjuntos:
              nombre = os.path.basename(archivo)
              try:
                  with open(archivo,'rb') as f:
                      contenido = f.read()
                  if len(contenido) < 10:
                      print(f"  Omitiendo vacio: {nombre}")
                      continue
                  part = MIMEBase('application','octet-stream')
                  part.set_payload(contenido)
                  encoders.encode_base64(part)
                  part.add_header('Content-Disposition',
                                  f'attachment; filename="{nombre}"')
                  msg.attach(part)
                  print(f"  Adjunto: {nombre} ({len(contenido):,} bytes)")
              except Exception as e:
                  print(f"  Error adjuntando {nombre}: {e}")

          try:
              server = smtplib.SMTP_SSL('smtp.gmail.com',465)
              server.login(usuario,clave)
              server.sendmail(usuario,usuario,msg.as_string())
              server.close()
              print(f"Correo enviado a {usuario}")
          except Exception as e:
              print(f"Error enviando: {e}")
              raise
          PYEOF

      - name: Guardar en GitHub como artefacto
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reporte-${{ github.run_number }}
          path: reportes/
          retention-days: 30
