name: Agente Avicola Semanal

on:
  schedule:
    - cron: '0 13 * * 1'
  workflow_dispatch:

jobs:
  ejecutar-agente:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install anthropic requests pandas

      - name: Ejecutar agente
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python agente_avicola.py

      - name: Enviar reporte por correo
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
        run: |
          python - <<'EOF'
          import smtplib, os, glob
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText
          from email.mime.base import MIMEBase
          from email import encoders
          from datetime import date

          usuario = os.environ['GMAIL_USER']
          clave   = os.environ['GMAIL_PASSWORD'].replace(' ', '')

          reportes = glob.glob('reportes/reporte_*.txt')
          cuerpo = "Reporte generado sin contenido."
          if reportes:
              with open(reportes[0], 'r', encoding='utf-8') as f:
                  cuerpo = f.read()

          msg = MIMEMultipart()
          msg['From']    = usuario
          msg['To']      = usuario
          msg['Subject'] = f'Reporte Avicola Siachoque - {date.today()}'
          msg.attach(MIMEText(cuerpo, 'plain', 'utf-8'))

          for archivo in glob.glob('reportes/*.json'):
              with open(archivo, 'rb') as f:
                  part = MIMEBase('application', 'octet-stream')
                  part.set_payload(f.read())
                  encoders.encode_base64(part)
                  part.add_header('Content-Disposition',
                      f'attachment; filename={os.path.basename(archivo)}')
                  msg.attach(part)

          try:
              server = smtplib.SMTP_SSL('smtp.gmail.com', 465)
              server.login(usuario, clave)
              server.sendmail(usuario, usuario, msg.as_string())
              server.close()
              print(f'Correo enviado exitosamente a {usuario}')
          except Exception as e:
              print(f'Error enviando correo: {e}')
          EOF

      - uses: actions/upload-artifact@v4
        with:
          name: reporte-${{ github.run_number }}
          path: reportes/
          retention-days: 30
